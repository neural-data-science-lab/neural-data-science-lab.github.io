<li class="media mb-5">
    <img class="align-self-center mr-3"
         src="/assets/images/team/{{ member.image }}"
         style="width: 120px; height: 100px; object-fit: cover; border-radius: 50%; filter: grayscale(0%);"
         alt="{{member.title}}">

    <div class="media-body">
      <h5 class="mt-0"><a href="{{ member.url }}">{{ member.title }}</a></h5>
      <p>{{member.role}}</p>
      {%- include team_member_social.html -%}
    </div>
</li>
